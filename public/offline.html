<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline · Ward Manager</title>
  <style>
    :root { --teal: #0d9488; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg); color: var(--text); 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      height: 100vh; margin: 0; text-align: center; padding: 20px;
    }
    .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 320px; }
    .icon { width: 64px; height: 64px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 32px; height: 32px; color: var(--muted); }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 12px; }
    p { font-size: 14px; color: var(--muted); line-height: 1.5; margin: 0 0 32px; }
    button { 
      background-color: var(--teal); color: white; border: none; 
      padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; 
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M1 9.286a15 15 0 0 1 22 0"/></svg>
    </div>
    <h1>You are offline</h1>
    <p>Connectivity lost. Your recent patient records are still saved on this device.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
